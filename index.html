<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take His Name Upon You</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    header h1 {
      text-align: center;
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      font-size: 1.2em;
      font-style: italic;
      margin-bottom: 40px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }
    .card h2 {
      margin-top: 0;
      color: #333;
    }
    .card p {
      line-height: 1.5;
      color: #555;
    }
    .card a {
      color: #0066cc;
      text-decoration: none;
    }
    .card a:hover {
      text-decoration: underline;
    }
    .checkbox-container {
      margin-top: 15px;
    }
    input[type="checkbox"] {
      transform: scale(1.3);
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Take His Name Upon You</h1>
      <p class="subtitle">
        “… that they are willing to take upon them the <strong>name</strong> of thy Son…” (emphasis added)
        <br><br>
        What name(s) of the Son are you willing to take upon yourself this week?
      </p>
    </header>

    <main id="devotional-container">
      <!-- Devotional cards will be inserted here by app.js -->
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
