<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>365-Day Devotional</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0 20px;
    }

    header {
      text-align: center;
      padding: 30px 0 10px 0;
    }

    header h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    header p {
      font-size: 1.1em;
      color: #34495e;
    }

    #devotional-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .card {
      background-color: #fff;
      border-radius: 10px;
      padding: 20px;
      width: 300px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin-top: 0;
      color: #2c3e50;
    }

    .card p {
      margin: 10px 0;
      line-height: 1.4;
    }

    .card a {
      color: #2980b9;
      text-decoration: none;
    }

    .card a:hover {
      text-decoration: underline;
    }

    label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>365-Day Devotional</h1>
    <p>“… that they are willing to take upon them the <strong>name</strong> of thy Son…”<br>
       What name(s) of the Son are you willing to take upon yourself this week?</p>
  </header>

  <div id="devotional-container">
    <!-- Cards will be dynamically generated here by app.js -->
  </div>

  <script src="app.js"></script>
</body>
</html>
